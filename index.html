<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smak-a-Dot™ | V11 Precision Blitz</title>
    <style>
        :root {
            --cyan: #00C3FF;
            --orange: #FF5E00;
            --white: #FFFFFF;
            --gray: #f0f0f0;
            --pizza-gold: #D4AF37;
        }
/* --- THE SUN/MOON THEMES --- */
        body {
            --bg-color: var(--white);
            --text-color: #111;
            --border-color: var(--cyan);
            --overlay-bg: rgba(255, 255, 255, 0.95);
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        body.dark-mode {
            --bg-color: #0a0a0a;
            --text-color: #f0f0f0;
            --border-color: #333;
            --overlay-bg: rgba(10, 10, 10, 0.95);
        }
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: var(--white);
            display: flex; flex-direction: column;
            overflow: hidden; user-select: none;
            touch-action: manipulation;
        }

        .pizza-watermark {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 14vw; font-weight: 900; line-height: 0.8;
            color: rgba(212, 175, 55, 0.18); text-align: center;
            pointer-events: none; z-index: 1; text-transform: uppercase;
        }

#overlay {
            position: fixed; inset: 0; background: var(--overlay-bg); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; padding: 20px;
        }

        .stats-group { display: flex; align-items: center; gap: 15px; }
        .stats { font-size: 1.1rem; font-weight: bold; }

        .controls button {
            padding: 8px 12px; font-weight: bold; cursor: pointer;
            border: 2px solid #333; background: white; border-radius: 4px;
        }

        /* Merged Game Board: No Grid, Full Screen Relative Area */
        #game-board {
            flex-grow: 1; 
            display: block; 
            padding: 10px; z-index: 5;
            position: relative;
            cursor: crosshair;
        }

        /* Merged Dot: Absolute positioning, single target size */
        .dot { 
            position: absolute; 
            width: 65px; height: 65px; 
            border-radius: 50%; 
            z-index: 6; 
            transform: translate(-50%, -50%) scale(1);
            transition: transform 0.05s ease-out;
        }
        
        .dot:active { transform: translate(-50%, -50%) scale(0.85); }

        /* Original Tiers */
        .tier-cyan { background: var(--cyan); box-shadow: 0 0 15px var(--cyan); }
        .tier-orange { background: var(--orange); box-shadow: 0 0 20px var(--orange); }
        .tier-white { background: #fff; border: 5px solid var(--orange); box-shadow: 0 0 25px white; }

        /* Merged Floater: Spawns at exact dot coordinates */
        .floater {
            position: absolute; 
            transform: translate(-50%, -50%);
            color: var(--orange); font-size: 2.8rem; font-weight: 900;
            pointer-events: none; animation: floatUp 0.6s ease-out forwards; z-index: 100;
            text-shadow: 3px 3px 0px white;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -150px); }
        }

        #overlay {
            position: fixed; inset: 0; background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; padding: 20px;
        }

        .full-legend { 
            display: flex; justify-content: center; gap: 40px; 
            margin: 20px 0; padding: 15px 30px; 
            border: 2px dashed #ccc; border-radius: 20px; 
        }
        .legend-item { display: flex; flex-direction: column; align-items: center; font-size: 0.9rem; }
        .dot-sample { width: 35px; height: 35px; border-radius: 50%; margin-bottom: 8px; }

        .p-btn, .l-btn { padding: 10px 18px; border: 3px solid var(--cyan); background: none; font-size: 1rem; font-weight: 900; cursor: pointer; border-radius: 8px; margin: 3px; }
        .p-btn.active, .l-btn.active { background: var(--cyan); color: white; }
        .l-btn-turbo.active { background: var(--orange); border-color: var(--orange); }

        .start-btn { background: var(--orange); color: white; border: none; padding: 20px 60px; font-size: 2.2rem; font-weight: 900; border-radius: 12px; cursor: pointer; box-shadow: 0 6px 0 #b34200; margin-top: 15px;}
        .start-btn:active { transform: translateY(3px); box-shadow: none; }

        .footer { padding: 10px; text-align: center; border-top: 1px solid #ddd; font-size: 12px; z-index: 10; background: white;}
    </style>
</head>
<body>

    <div class="pizza-watermark">MARK’S<br>PIZZA<br>LEBANON</div>

    <header>
        <div class="stats-group">
            <span class="stats">P<span id="cur-p-display">1</span></span>
            <span class="stats" style="color:var(--cyan)">SCORE: <span id="score">0</span></span>
        </div>
        <div class="controls">
            <span class="stats" style="color:var(--orange); margin-right:10px;"><span id="time">30</span>s</span>
            <button id="pause-btn">PAUSE</button>
            <button id="restart-btn">RESTART</button>
        </div>
    </header>

    <div id="game-board"></div>

    <div id="overlay">
        <h1 style="font-size: 3.5rem; margin: 0; color: var(--orange);">smak-a-dot™</h1>
        
        <div id="lobby-controls">
            <div class="full-legend">
                <div class="legend-item"><div class="dot-sample tier-cyan"></div><span style="font-weight:900;">1 PT</span></div>
                <div class="legend-item"><div class="dot-sample tier-orange"></div><span style="font-weight:900;">5 PTS</span></div>
                <div class="legend-item"><div class="dot-sample tier-white" style="border:3px solid var(--orange)"></div><span style="font-weight:900;">10 PT</span></div>
            </div>

            <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
                <div>
                    <p style="font-weight: 900; margin: 5px;">PLAYERS</p>
                    <div class="player-select">
                        <button class="p-btn active" onclick="setPlayers(1)">1</button>
                        <button class="p-btn" onclick="setPlayers(2)">2</button>
                        <button class="p-btn" onclick="setPlayers(3)">3</button>
                        <button class="p-btn" onclick="setPlayers(4)">4</button>
                    </div>
                </div>
                <div>
                    <p style="font-weight: 900; margin: 5px;">LEVEL</p>
                    <div class="level-select">
                        <button class="l-btn active" onclick="setLevel('kids')">KIDS</button>
                        <button class="l-btn l-btn-turbo" onclick="setLevel('turbo')">TURBO BLITZ</button>
                    </div>
                </div>
            </div>

            <button class="start-btn" id="start-btn">GO!</button>
            <div style="color: var(--cyan); font-weight: 900; font-size: 1.2rem; margin-top: 15px;">HI-SCORE: <span id="hi-score-val">0</span></div>
        </div>

        <div id="results" style="display:none;">
            <h2 id="winner-text" style="font-size: 2.8rem; color: var(--cyan);"></h2>
            <div id="score-list" style="font-size: 1.8rem; margin-bottom: 25px;"></div>
            <button class="start-btn" id="next-player-btn">READY?</button>
        </div>
    </div>

    <footer class="footer"> 
        <p style="font-weight:bold; color:var(--orange); margin:0;">Built with StupidSimpleCrazyFast™</p> 
        <div>MachinoLabs • Joe • 717.623.2907</div> 
    </footer>

    <script>
        let audioCtx;
        function unlockAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(freq, type, dur) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        let state = { numPlayers: 1, currentPlayer: 1, scores: [], timeLeft: 30, gameActive: false, isPaused: false, spawnRate: 800, level: 'kids' };
        let timerInterval = null, spawnTimeout = null;
        const board = document.getElementById('game-board');

        let highScore = localStorage.getItem('smak_hi_score') || 0;
        document.getElementById('hi-score-val').textContent = highScore;

        function setPlayers(n) {
            state.numPlayers = n;
            document.querySelectorAll('.p-btn').forEach((btn, i) => btn.classList.toggle('active', i + 1 === n));
            unlockAudio();
        }

        function setLevel(l) {
            state.level = l;
            document.querySelectorAll('.l-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase().includes(l));
            });
            unlockAudio();
        }

        // Updated Floater: spawns at precise X/Y coordinates
        function spawnFloater(x, y, pts) {
            const f = document.createElement('div');
            f.className = 'floater'; f.textContent = `+${pts}`;
            f.style.left = `${x}px`;
            f.style.top = `${y}px`;
            board.appendChild(f);
            setTimeout(() => { if(f.parentNode) f.remove(); }, 600);
        }

        function stopAllProcesses() {
            state.gameActive = false;
            clearInterval(timerInterval);
            clearTimeout(spawnTimeout);
            document.querySelectorAll('.dot').forEach(d => d.remove());
        }

        function startGame() {
            unlockAudio();
            stopAllProcesses();
            state.gameActive = true; 
            state.isPaused = false; 
            state.timeLeft = 30; 
            state.spawnRate = (state.level === 'turbo') ? 600 : 900;
            
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('cur-p-display').textContent = state.currentPlayer;
            document.getElementById('score').textContent = "0";
            document.getElementById('time').textContent = "30";
            startTimer(); 
            spawnDot(); // Engage Sniper Logic
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (!state.isPaused && state.gameActive) {
                    state.timeLeft--;
                    document.getElementById('time').textContent = state.timeLeft;
                    
                    if (state.timeLeft % 5 === 0) {
                        const multiplier = (state.level === 'turbo') ? 0.75 : 0.85;
                        state.spawnRate = Math.max(state.spawnRate * multiplier, 250); // 250ms FLOOR
                    }
                    if (state.timeLeft <= 0) endTurn();
                }
            }, 1000);
        }

        // --- MERGED SNIPER ENGINE: Single target, random coords, instant respawn ---
        function spawnDot() {
            if (!state.gameActive || state.isPaused) return;

            // 1. Clear any existing targets
            clearTimeout(spawnTimeout);
            const oldDot = document.querySelector('.dot');
            if (oldDot) oldDot.remove();

            // 2. Generate Random Coords inside the board bounds
            const x = Math.random() * (board.clientWidth - 80) + 40;
            const y = Math.random() * (board.clientHeight - 80) + 40;

            // 3. Roll for Tier (cyan, orange, or white)
            const tierRoll = Math.random();
            let tier = 'tier-cyan', pts = 1, durMultiplier = 1;

            if (tierRoll > 0.92) { 
                tier = 'tier-white'; pts = 10; durMultiplier = 0.55; // Fast vanish 
            } else if (tierRoll > 0.70) { 
                tier = 'tier-orange'; pts = 5; durMultiplier = 0.8; 
            }

            // 4. Create the Target
            const dot = document.createElement('div');
            dot.className = `dot ${tier}`; 
            dot.dataset.points = pts;
            dot.style.left = `${x}px`;
            dot.style.top = `${y}px`;

            // 5. The "Smak" Event
            const handleSmak = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (!state.gameActive || state.isPaused) return;

                unlockAudio();
                let cur = parseInt(document.getElementById('score').textContent);
                document.getElementById('score').textContent = cur + pts;
                
                spawnFloater(x, y, pts);
                
                if (pts === 1) playSound(700, 'triangle', 0.1); 
                if (pts === 5) playSound(850, 'square', 0.15);
                if (pts === 10) playSound(1300, 'triangle', 0.25);
                
                dot.remove();
                spawnDot(); // Instant next target
            };

            // Bind to both click and touch for instant mobile response
            dot.addEventListener('mousedown', handleSmak);
            dot.addEventListener('touchstart', handleSmak, {passive: false});

            board.appendChild(dot);

            // 6. Vanish Timer (Player is too slow)
            spawnTimeout = setTimeout(() => {
                if (state.gameActive && !state.isPaused) spawnDot();
            }, state.spawnRate * durMultiplier);
        }

        function endTurn() {
            stopAllProcesses();
            playSound(300, 'sawtooth', 0.4);
            let finalScore = parseInt(document.getElementById('score').textContent);
            state.scores[state.currentPlayer - 1] = finalScore;
            
            if (finalScore > highScore) {
                highScore = finalScore;
                localStorage.setItem('smak_hi_score', highScore);
                document.getElementById('hi-score-val').textContent = highScore;
            }
            
            if (state.currentPlayer < state.numPlayers) {
                state.currentPlayer++;
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('lobby-controls').style.display = 'none';
                document.getElementById('results').style.display = 'block';
                document.getElementById('winner-text').textContent = `P${state.currentPlayer-1} SCORE: ${finalScore}`;
                document.getElementById('score-list').textContent = `Ready Player ${state.currentPlayer}?`;
                document.getElementById('next-player-btn').onclick = startGame;
            } else { showFinalWinner(); }
        }

        function showFinalWinner() {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('lobby-controls').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            let max = Math.max(...state.scores);
            let winIdx = state.scores.indexOf(max) + 1;
            document.getElementById('winner-text').textContent = `PLAYER ${winIdx} WINS!`;
            document.getElementById('score-list').textContent = state.scores.map((s, i) => `P${i+1}: ${s}`).join(' | ');
            document.getElementById('next-player-btn').textContent = "NEW LOBBY";
            document.getElementById('next-player-btn').onclick = () => location.reload();
        }

        document.getElementById('pause-btn').addEventListener('click', function() {
            if(!state.gameActive) return;
            state.isPaused = !state.isPaused;
            this.textContent = state.isPaused ? "RESUME" : "PAUSE";
            if(!state.isPaused) { 
                unlockAudio(); 
                spawnDot(); // Resume sniper engine
            }
        });
        
        document.getElementById('restart-btn').addEventListener('click', () => location.reload());
        document.getElementById('start-btn').addEventListener('click', startGame);

        document.getElementById('pause-btn').addEventListener('click', function() {
            if(!state.gameActive) return;
            state.isPaused = !state.isPaused;
            this.textContent = state.isPaused ? "RESUME" : "PAUSE";
            if(!state.isPaused) { 
                unlockAudio(); 
                spawnDot(); // Resume sniper engine
            }
        });
        
        document.getElementById('restart-btn').addEventListener('click', () => location.reload());
        document.getElementById('start-btn').addEventListener('click', startGame);

        // --- PASTE THIS RIGHT HERE ---
        // --- SUN / MOON LOGIC ---
        const themeBtn = document.getElementById('theme-btn');
        let isDark = false;

        themeBtn.addEventListener('click', () => {
            isDark = !isDark;
            document.body.classList.toggle('dark-mode', isDark);
            
            if (isDark) {
                themeBtn.textContent = "☀️ SUN";
                document.querySelector('.pizza-watermark').style.color = "rgba(212, 175, 55, 0.05)"; // Dim watermark
            } else {
                themeBtn.textContent = "🌙 MOON";
                document.querySelector('.pizza-watermark').style.color = "rgba(212, 175, 55, 0.18)"; // Restore watermark
            }
        });
        // --- END OF PASTE ---

    </script>
</body>
</html>
