<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smak-A-Dot™ | MachinoLabs</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔴</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --cyan: #00e5ff;
            --gold: #ffbf00;
            --red: #ff3d00;
            --panel: #0a0a0a;
            --line: #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- UI LAYER --- */
        #ui-layer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid var(--line);
            z-index: 100;
        }

        .brand { font-weight: 900; letter-spacing: 2px; text-transform: uppercase; font-size: 1.2rem; }
        .brand span { color: var(--cyan); }

        #stats { display: flex; gap: 30px; }
        .stat-box { text-align: center; }
        .stat-label { font-size: 0.7rem; color: #444; text-transform: uppercase; font-weight: 900; }
        .stat-value { font-size: 1.5rem; font-weight: 900; color: var(--gold); }

        /* --- GAME BOARD --- */
        #game-board {
            flex-grow: 1;
            position: relative;
            cursor: crosshair;
        }

        .dot {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, var(--red) 0%, #900 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 61, 0, 0.4);
            transform: translate(-50%, -50%) scale(1);
            transition: transform 0.1s ease-out;
            border: 3px solid rgba(255,255,255,0.2);
        }

        .dot:active { transform: translate(-50%, -50%) scale(0.8); }

        /* --- FEEDBACK --- */
        .floater {
            position: absolute;
            color: var(--cyan);
            font-weight: 900;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
            z-index: 50;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        /* --- SCREENS --- */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
        }

        .overlay h1 { font-size: 4rem; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; }
        .overlay p { color: #666; margin-bottom: 30px; max-width: 400px; }

        .btn {
            background: var(--cyan);
            color: black;
            padding: 20px 50px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 229, 255, 0.4); }

        #email-capture {
            margin-top: 30px;
            display: none; /* Shows on Game Over */
        }

        input[type="email"] {
            padding: 15px;
            border-radius: 5px;
            border: 1px solid var(--line);
            background: #111;
            color: white;
            margin-right: 10px;
            width: 250px;
        }

        /* --- FOOTER --- */
        .footer { padding: 20px; text-align: center; color: #222; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="brand"><span>SS</span>CF // SAD</div>
        <div id="stats">
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Time</div>
                <div id="timer" class="stat-value">30</div>
            </div>
        </div>
    </div>

    <main id="game-board"></main>

    <div id="start-screen" class="overlay">
        <h1>SMAK-A-DOT</h1>
        <p>Reflexes at the speed of thought. Smak the red targets. Don't blink.</p>
        <button class="btn" onclick="startGame()">Initiate Run</button>
    </div>

    <div id="end-screen" class="overlay" style="display: none;">
        <h1>RUN OVER</h1>
        <div class="stat-box" style="margin-bottom: 20px;">
            <div class="stat-label">Final Score</div>
            <div id="final-score" class="stat-value" style="font-size: 4rem;">0</div>
        </div>
        
        <div id="email-section">
            <p>Join the MachinoLabs Elite to save your scores.</p>
            <input type="email" id="player-email" placeholder="Enter Email">
            <button class="btn" style="padding: 15px 30px;" onclick="saveLead()">Join</button>
        </div>
        
        <button class="btn" style="background: none; border: 1px solid var(--cyan); color: var(--cyan); margin-top: 20px;" onclick="location.reload()">Try Again</button>
    </div>

    <footer class="footer">
        MachinoLabs • Built for Speed • ⭐ LET'S BUILD SOMETHING ⭐
    </footer>

    <script>
        const state = {
            score: 0,
            timeLeft: 30,
            active: false,
            difficulty: 800 // ms
        };

        const board = document.getElementById('game-board');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        let gameTimer;
        let spawnTimeout;

        // --- AUDIO ENGINE (Synthesized) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, dur) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        function spawnDot() {
            if (!state.active) return;

            // CLEARANCE
            clearTimeout(spawnTimeout);
            const oldDot = document.querySelector('.dot');
            if (oldDot) oldDot.remove();

            // CREATE
            const dot = document.createElement('div');
            dot.className = 'dot';
            
            // MATH
            const x = Math.random() * (board.clientWidth - 80) + 40;
            const y = Math.random() * (board.clientHeight - 80) + 40;
            dot.style.left = `${x}px`;
            dot.style.top = `${y}px`;

            dot.onmousedown = (e) => {
                e.stopPropagation();
                smak(x, y);
            };

            board.appendChild(dot);

            // AUTO-MOVE (Speed challenge)
            spawnTimeout = setTimeout(() => {
                if (state.active) spawnDot();
            }, state.difficulty);
        }

        function smak(x, y) {
            state.score += 10;
            scoreEl.textContent = state.score;
            playSound(600, 'square', 0.1);
            
            // FEEDBACK
            const f = document.createElement('div');
            f.className = 'floater';
            f.textContent = '+10';
            f.style.left = `${x}px`;
            f.style.top = `${y}px`;
            board.appendChild(f);
            setTimeout(() => f.remove(), 600);

            // DIFFICULTY CRANK
            if (state.difficulty > 400) state.difficulty -= 5;

            spawnDot(); // Instant next target
        }

        function startGame() {
            state.active = true;
            state.score = 0;
            state.timeLeft = 30;
            state.difficulty = 800;
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('end-screen').style.display = 'none';
            
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            gameTimer = setInterval(() => {
                state.timeLeft--;
                timerEl.textContent = state.timeLeft;
                if (state.timeLeft <= 0) endGame();
            }, 1000);

            spawnDot();
        }

        function endGame() {
            state.active = false;
            clearInterval(gameTimer);
            clearTimeout(spawnTimeout);
            playSound(150, 'sawtooth', 0.5);
            
            document.getElementById('end-screen').style.display = 'flex';
            document.getElementById('final-score').textContent = state.score;
        }

        function saveLead() {
            const email = document.getElementById('player-email').value;
            if(email) {
                alert("MachinoLabs Elite updated. Welcome to the crew.");
                document.getElementById('email-section').innerHTML = "<p style='color:var(--cyan)'>ACCESS GRANTED</p>";
            }
        }
    </script>
</body>
</html>
